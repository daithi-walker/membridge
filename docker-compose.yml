services:
  claude-ui:
    build: .
    image: claude-ui:latest
    container_name: claude-ui
    restart: unless-stopped
    ports:
      - "127.0.0.1:7842:7842"
    volumes:
      - "${HOME}/.claude-ui:/data"
      - "${HOME}/.claude/projects:${HOME}/.claude/projects:ro"
      - "${HOME}/.config/gcloud:/root/.config/gcloud:ro"
    environment:
      CLAUDE_UI_DB: /data/sessions.db
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_SUMMARY_MODEL: ${CLAUDE_SUMMARY_MODEL:-}
      # Vertex (optional — set CLAUDE_CODE_USE_VERTEX=1 to use instead)
      CLAUDE_CODE_USE_VERTEX: ${CLAUDE_CODE_USE_VERTEX:-}
      ANTHROPIC_VERTEX_PROJECT_ID: ${ANTHROPIC_VERTEX_PROJECT_ID:-}
      CLOUD_ML_REGION: ${CLOUD_ML_REGION:-global}
      # Path to ~/.claude/projects on the host — used by _find_transcript()
      CLAUDE_PROJECTS_ROOT: ${HOME}/.claude/projects
